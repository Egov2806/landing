<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | ПравоЭксперт</title>
    <style>
        :root {
            --bg: #1c1d20; --bg-card: #242529;
            --text: #f0ede8; --text-muted: #a8a6a1; --accent: #5b8af7;
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; user-select: none; -webkit-user-select: none; }
        .navbar { background: rgba(28,29,32,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-logo { font-size: 20px; font-weight: 700; color: #fff; text-decoration: none; }
        .navbar-logo span { color: var(--accent); }
        .navbar-user { display: flex; gap: 20px; align-items: center; }
        .navbar-user a { color: var(--text-muted); text-decoration: none; font-size: 14px; }
        .navbar-user a:hover { color: #fff; }
        .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
        h1 { font-size: 32px; margin-bottom: 8px; color: #fff; }
        .subtitle { color: var(--text-muted); margin-bottom: 36px; }
        .login-box { max-width: 420px; margin: 80px auto; background: var(--bg-card); padding: 48px 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); }
        .login-box h2 { font-size: 26px; margin-bottom: 8px; }
        .login-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
        input { width: 100%; padding: 14px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: #2c2d32; color: #fff; font-size: 15px; margin-bottom: 14px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { background: #6a9af8; }
        .error { color: #e94560; font-size: 13px; margin-bottom: 14px; display: none; }
        .error.show { display: block; }
        .material-card { background: var(--bg-card); border-radius: var(--radius); padding: 24px 28px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
        .material-card h3 { color: #fff; font-size: 16px; margin-bottom: 4px; }
        .material-card .date { color: var(--text-muted); font-size: 12px; }
        .btn-view { background: var(--accent); color: #fff; padding: 10px 22px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-view:hover { background: #6a9af8; }
        .empty { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 15px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 32px; }
        .tab { padding: 10px 22px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: 0.3s; }
        .tab.active { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .back-link { display: block; text-align: center; color: var(--accent); margin-top: 18px; font-size: 13px; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-logo">Право<span>Эксперт</span></a>
        <div class="navbar-user" id="userBar" style="display:none;"><span id="userName"></span> <a href="#" onclick="logout()">Выйти</a></div>
    </nav>
    <div class="container">
        <div id="loginScreen">
            <div class="login-box">
                <h2>Личный кабинет</h2>
                <p>Войдите для доступа к материалам</p>
                <div class="error" id="loginError"></div>
                <form onsubmit="login(event)">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Пароль" required>
                    <button type="submit">Войти</button>
                </form>
                <a href="/" class="back-link">← На главную</a>
            </div>
        </div>
        <div id="cabinetScreen" style="display:none;">
            <h1>Мои материалы</h1>
            <p class="subtitle" id="cabinetEmail"></p>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('materials')">Материалы</button>
                <button class="tab" onclick="switchTab('profile')">Профиль</button>
            </div>
            <div class="tab-content active" id="tab-materials"><div id="materialsList"></div></div>
            <div class="tab-content" id="tab-profile">
                <div class="material-card"><div><h3 id="profileName"></h3><div class="date" id="profilePhone"></div></div></div>
            </div>
        </div>
    </div>
    <script>
        const API = 'https://egorovslava.pythonanywhere.com';
        let token = localStorage.getItem('token');
        let user = null;
        if (token) checkAuth();

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            try {
                const resp = await fetch(`${API}/api/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
                const data = await resp.json();
                if (data.status === 'ok') {
                    token = data.token; localStorage.setItem('token', token); user = data.user;
                    showCabinet(); loadMaterials();
                } else { errorEl.textContent = data.message || 'Неверный email или пароль'; errorEl.classList.add('show'); }
            } catch(err) { errorEl.textContent = 'Ошибка соединения'; errorEl.classList.add('show'); }
        }

        async function checkAuth() {
            try {
                const resp = await fetch(`${API}/api/auth/me`, { headers:{'Authorization':`Bearer ${token}`} });
                if (resp.ok) { const data = await resp.json(); user = data.user; showCabinet(); loadMaterials(); }
                else { localStorage.removeItem('token'); token = null; }
            } catch(err) { localStorage.removeItem('token'); token = null; }
        }

        function showCabinet() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('cabinetScreen').style.display = 'block';
            document.getElementById('userBar').style.display = 'flex';
            document.getElementById('userName').textContent = user.name;
            document.getElementById('cabinetEmail').textContent = user.email;
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profilePhone').textContent = '📞 ' + (user.phone || '—');
        }

        async function loadMaterials() {
            const container = document.getElementById('materialsList');
            try {
                const resp = await fetch(`${API}/api/my-materials`, { headers:{'Authorization':`Bearer ${token}`} });
                const data = await resp.json();
                if (data.materials && data.materials.length > 0) {
                    container.innerHTML = data.materials.map(m => `<div class="material-card"><div><h3>${m.title}</h3><div class="date">Приобретено: ${m.date}</div></div><button class="btn-view" onclick="openViewer('${m.view_url}','${m.id}')">Смотреть</button></div>`).join('');
                } else { container.innerHTML = '<div class="empty">У вас пока нет материалов.</div>'; }
            } catch(err) { container.innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
        }

        function openViewer(url, materialId) {
            window.open(url + '?token=' + token, '_blank');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-'+tab).classList.add('active');
        }

        function logout() { localStorage.removeItem('token'); token = null; user = null; location.reload(); }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['s','S','u','U','p','P'].includes(e.key)) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
    </script>
</body>
</html>
