<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр материала | ПравоЭксперт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1c1d20;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
        .watermark {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 48px; color: rgba(255,255,255,0.04);
            pointer-events: none; white-space: nowrap; z-index: 10;
        }
        .error {
            color: #e94560; text-align: center; margin-top: 100px;
            font-family: 'Inter', Arial, sans-serif; font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="watermark" id="watermark"></div>
    <div class="error" id="error" style="display:none;"></div>
    <iframe id="viewerFrame" sandbox="allow-scripts allow-same-origin" style="display:none;"></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        const product = params.get('product');
        const token = params.get('token');
        const email = params.get('email');

        if (!product || !token) {
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Неверная ссылка';
        } else {
            document.getElementById('watermark').textContent = email || '';
            const frame = document.getElementById('viewerFrame');
            frame.src = `https://egorovslava.pythonanywhere.com/view/${product}?token=${token}`;
            frame.style.display = 'block';
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['s','S','u','U','p','P'].includes(e.key)) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
    </script>
</body>
</html>
